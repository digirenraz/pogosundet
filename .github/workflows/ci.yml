name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # 'true' on normal PRs/pushes; '' (falsey) on Dependabot-triggered runs,
    # which GitHub deliberately withholds repo secrets from. Steps that need a
    # real Supabase backend (E2E) are gated on this; the rest run either way
    # (Build uses placeholder fallbacks). Same pattern as claude-review.yml's
    # HAS_TOKEN. Lets Dependabot PRs pass lint+typecheck+build (which is what
    # actually validates a dependency bump) while skipping the backend-only E2E.
    env:
      HAS_SUPABASE_SECRETS: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL != '' }}
    # Run inside Playwright's official image: the browsers and all OS deps are
    # pre-installed, so CI no longer downloads Chromium from cdn.playwright.dev
    # at runtime. That CDN download intermittently stalls after reaching 100%
    # and hung the job for days (PRs #64–#68). The image is pulled from
    # Microsoft's container registry instead. Pin the tag to the installed
    # @playwright/test version — the baked-in browsers must match it.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # The canonical type gate. CLAUDE.md calls `npm run build` the type gate,
      # but nothing in CI used to build or typecheck — so TS errors could merge.
      # `tsc --noEmit` is the fast standalone check.
      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm run test

      # Coverage over src/lib/** pure-logic modules (report #17). Visibility
      # tool only — continue-on-error so low numbers never block a merge.
      # Promote to a hard gate by removing continue-on-error and adding
      # thresholds to vitest.config.ts once a baseline is known.
      - name: Coverage (src/lib/**)
        run: npm run test:coverage
        continue-on-error: true

      # Full production build — catches build-time failures `tsc` misses (RSC
      # boundaries, route config, bundling). NEXT_PUBLIC_* are read at build
      # time for the client bundle; Sentry source-map upload stays skipped
      # without SENTRY_AUTH_TOKEN (see next.config.ts).
      # Placeholder fallbacks (||) so the build still runs when the real secrets
      # are absent (Dependabot runs). The build only needs the NEXT_PUBLIC_* vars
      # to be present and well-formed for the client bundle, not to reach a live
      # Supabase — so a dummy URL/key is enough to validate that a dependency
      # bump still compiles and builds.
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}

      # E2E boots the app against a real Supabase, so it can't run without the
      # secrets (Dependabot runs). Skipped there; lint+typecheck+build still gate
      # the dependency. Normal PRs/pushes run it unchanged.
      - name: E2E tests (Playwright)
        if: env.HAS_SUPABASE_SECRETS == 'true'
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      # Only meaningful when E2E actually ran; skip otherwise so it doesn't try
      # to upload a non-existent report on a Dependabot run that failed earlier.
      - name: Upload Playwright report
        if: (failure() || cancelled()) && env.HAS_SUPABASE_SECRETS == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14
