# Dependabot keeps dependencies (and their security patches) current by opening
# PRs on a schedule. Those PRs run through CI + the Claude review like any other,
# so they can be triaged and merged with the normal workflow.
#
# See docs/professionalisation-report.html (recommendation #8).
version: 2
updates:
  # npm (Next.js app dependencies)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      # Off-zero minute/day to avoid the Monday-9am stampede on GitHub's side.
      day: "tuesday"
      time: "07:13"
    open-pull-requests-limit: 5
    groups:
      # Collapse low-risk minor/patch bumps into a single PR to cut noise.
      # Majors stay as individual PRs so breaking changes are reviewed alone.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # ESLint 10 majors are held: eslint-config-next still bundles
    # eslint-plugin-react@7.x, which calls context.getFilename() — an API ESLint
    # 10 removed — so ESLint 10 crashes on load. No ESLint-10-compatible
    # eslint-plugin-react is published yet, so this is blocked upstream, not a
    # config migration on our side. Drop this ignore once eslint-config-next
    # declares ESLint 10 support, then bump eslint + eslint-config-next together.
    # (Closed #174 for the same reason.)
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "deps"

  # GitHub Actions used by our workflows (ci.yml, claude-review.yml).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "07:13"
    commit-message:
      prefix: "ci"
